apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: fitzenia-api-dev
  labels:
    cloud.googleapis.com/location: europe-north1
  annotations:
    run.googleapis.com/ingress: all
spec:
  template:
    metadata:
      annotations:
        # CPU and memory allocation (gen2 requires minimum 1 CPU)
        run.googleapis.com/cpu: "1"
        run.googleapis.com/memory: "512Mi"
        
        # Execution environment
        run.googleapis.com/execution-environment: gen2
        
        # Auto-scaling settings (smaller scale for dev)
        autoscaling.knative.dev/minScale: "0"
        autoscaling.knative.dev/maxScale: "3"
        
        # Timeout settings
        run.googleapis.com/timeout: "300s"
        
        # Cloud SQL connection (if needed)
        # run.googleapis.com/cloudsql-instances: PROJECT_ID:REGION:INSTANCE_NAME
    spec:
      containerConcurrency: 1
      timeoutSeconds: 300
      # Use default compute service account for now
      containers:
      - name: fitzenia-api-dev
        image: gcr.io/PROJECT_ID/fitzenia-api-dev:IMAGE_TAG
        ports:
        - name: http1
          containerPort: 8080
        env:
        - name: APP_ENVIRONMENT
          value: "DEVELOPMENT"
        - name: FATSECRET_CLIENT_ID
          valueFrom:
            secretKeyRef:
              name: FATSECRET_CLIENT_ID
              key: latest
        - name: FATSECRET_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: FATSECRET_CLIENT_SECRET
              key: latest
        - name: USDA_API_KEY
          valueFrom:
            secretKeyRef:
              name: USDA_API_KEY
              key: latest
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: OPENAI_API_KEY
              key: latest
        - name: USE_GEMINI
          value: "true"
        - name: GEMINI_API_KEY
          valueFrom:
            secretKeyRef:
              name: GEMINI_API_KEY
              key: latest
        - name: SUPABASE_URL
          valueFrom:
            secretKeyRef:
              name: SUPABASE_URL
              key: latest
        - name: SUPABASE_PUBLISHABLE_KEY
          valueFrom:
            secretKeyRef:
              name: SUPABASE_PUBLISHABLE_KEY
              key: latest
        - name: SUPABASE_JWT_VERIFICATION_MODE
          value: "JWKS"
        # ---------- Smart Food Search ----------
        # Shared canonical catalog + Gemini AI-grounded best match. When ENABLED=true,
        # SUPABASE_SERVICE_ROLE_KEY is required (ConfigLoader fails startup otherwise).
        - name: SMART_FOOD_SEARCH_ENABLED
          value: "true"
        - name: SMART_SEARCH_USDA_ENABLED
          value: "true"
        # false = async write-behind (first user sees upstream-only, catalog warms in background).
        # true  = sync-on-miss (first user waits 5-10s for AI but sees bestMatch in same request).
        - name: SMART_SEARCH_AI_SYNC_ON_MISS
          value: "false"
        - name: AI_SEARCH_RANK_MODEL
          value: "gemini-2.5-flash-lite"
        - name: AI_SEARCH_GENERATE_MODEL
          value: "gemini-2.5-flash"
        - name: AI_SEARCH_CLASSIFY_TIMEOUT_MS
          value: "3000"
        - name: AI_SEARCH_GENERATE_TIMEOUT_MS
          value: "8000"
        - name: CATALOG_WRITE_CONFIDENCE_THRESHOLD
          value: "0.7"
        # Backend-only. Bypasses RLS. Never expose to clients.
        - name: SUPABASE_SERVICE_ROLE_KEY
          valueFrom:
            secretKeyRef:
              name: SUPABASE_SERVICE_ROLE_KEY
              key: latest
        resources:
          limits:
            cpu: "1"
            memory: "1Gi"
          requests:
            cpu: "0.5"
            memory: "256Mi"
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        # No volume mounts needed for development (using embedded credentials)
